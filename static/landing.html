<!DOCTYPE html>
<html lang="en" data-theme="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vincent AI</title>
    <meta
      name="description"
      content="Vincent is a personal companion for early mental health reflection."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var hour = new Date().getHours();
        var theme = hour >= 6 && hour < 18 ? "day" : "night";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme === "night" ? "dark" : "light";
      })();
    </script>
    <link rel="stylesheet" href="/static/app.css?v=20260415a" />
    <script defer src="/static/app.js?v=20260415a"></script>
  </head>
  <body data-page="landing">
    <div class="site-shell">
      <div class="utility-row shell">
        <div class="top-actions">
          <div class="locale-toggle" aria-label="Language switch">
            <button type="button" class="locale-button" data-lang-target="en">EN</button>
            <button type="button" class="locale-button" data-lang-target="zh">中文</button>
          </div>
        </div>
      </div>

      <main class="shell landing-page landing-page-centered">
        <section class="hero-block hero-centered">
          <a href="/" class="hero-brand" aria-label="Vincent AI home" data-preserve-lang>
            <span class="hero-mark">V</span>
            <span class="hero-copy">Vincent AI</span>
          </a>
          <p class="eyebrow hero-summary" id="landingHeroSummary">Personal mental health companion</p>
          <h1 id="landingHeroTitle">Meet Vincent</h1>
          <p class="hero-purpose" id="landingHeroPurpose">
            A personal companion for early mental health reflection.
          </p>
          <a
            href="/assessment"
            class="button button-primary hero-button"
            id="landingHeroCta"
            data-preserve-lang
          >
            Start with assessment
          </a>
          <p class="helper-note hero-note" id="landingHeroNote">
            Private by default. Not for crisis support.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
